[tox]
envlist = {py310,py312}-{dj52}
skipsdist = True

[testenv]
basepython =
    py310: python3.10
    py312: python3.12
deps =
       dj52: Django>=5.2,<5.3

       # demo
       django-formtools>=2.5

       # test
       django-webtest>=1.9.11
       pyquery>=2.0
       webtest>=3.0

       # visual (optional)
       needle>=0.5.0
       pyvirtualdisplay>=3.0
       selenium>=4.0,<4.10

commands = {posargs:python -Wd ./manage.py test}
setenv =
    PYTHONPATH={toxinidir}
    NEEDLE_BASELINE_DIR={toxinidir}/tests/visual/screenshots/
    NEEDLE_OUTPUT_DIR={toxinidir}/tests/visual/screenshots_test/
passenv =
          NEEDLE_SAVE_BASELINE
          VISUAL
          DISPLAY
          NODISPLAY
